<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Brawlers Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header id="main-header">
            <h2 id="game-counter" class="hidden">Partida <span id="current-game">1</span> de <span id="total-games">0</span></h2>
            <div id="search-container" class="hidden">
                <input type="text" id="search-bar" placeholder="🔍 Buscar Brawler..." onkeyup="filtrarBrawlers()">
            </div>
        </header>

        <main id="steps-container">
            <section id="step-1" class="step active">
                <h1>¿Habrá Bans Globales?</h1>
                <div class="options">
                    <button class="btn-primary" onclick="setUsaBansGlobales(true)">Sí</button>
                    <button class="btn-secondary" onclick="setUsaBansGlobales(false)">No</button>
                </div>
            </section>

            <section id="step-2" class="step">
                <h1>Cantidad de Partidas</h1>
                <div class="options">
                    <button class="btn-primary" onclick="setPartidas(3)">3 Partidas</button>
                    <button class="btn-primary" onclick="setPartidas(5)">5 Partidas</button>
                </div>
            </section>

            <section id="step-3" class="step">
                <h1>Selecciona Bans Globales (1 a 5)</h1>
                <div id="global-grid" class="brawler-grid"></div>
                <button id="btn-next-global" class="btn-confirm" disabled onclick="renderModos()">Confirmar Bans Globales</button>
            </section>

            <section id="step-4" class="step">
                <h1>Selecciona Modo</h1>
                <div id="modes-grid" class="options"></div>
            </section>

            <section id="step-5" class="step">
                <h1>Selecciona Mapa</h1>
                <div id="maps-grid" class="options"></div>
            </section>

            <section id="step-6" class="step">
                <h1>Selecciona 6 Bans de Partida</h1>
                <div id="local-grid" class="brawler-grid"></div>
                <button id="btn-next-local" class="btn-confirm" disabled onclick="goToStep(7)">Confirmar Bans Locales</button>
            </section>

            <section id="step-7" class="step">
                <h1>¿Orden de Pick?</h1>
                <div class="options">
                    <button class="btn-primary" onclick="iniciarDraft(true)">First Pick</button>
                    <button class="btn-secondary" onclick="iniciarDraft(false)">Last Pick</button>
                </div>
            </section>

            <section id="step-8" class="step draft-section">
                <div class="draft-board">
                    <div class="team our-team">
                        <h3>NUESTRO EQUIPO</h3>
                        <div id="our-picks-container" class="team-slots"></div>
                    </div>
                    <div class="draft-vs">VS</div>
                    <div class="team enemy-team">
                        <h3>RIVAL</h3>
                        <div id="enemy-picks-container" class="team-slots"></div>
                    </div>
                </div>

                <div class="draft-controls">
                    <h2 id="turn-indicator" class="turn-title">Calculando...</h2>
                    
                    <div id="suggestions-area">
                        <h3>Top Sugerencias</h3>
                        <div id="suggestions-container" class="suggestions-grid"></div>
                    </div>

                    <div id="draft-selection-grid" class="brawler-grid"></div>
                    
                    <button id="btn-confirm-draft" class="btn-confirm hidden" onclick="confirmarPickDraft()">Confirmar Selección</button>
                    <button id="btn-next-match" class="btn-confirm hidden" onclick="siguientePartida()">Pasar a la Siguiente Partida</button>
                    <button id="btn-restart" class="btn-danger hidden" onclick="location.reload()">Finalizar y Reiniciar Todo</button>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
