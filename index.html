<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Draft Brawlers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="search-container" class="hidden">
            <input type="text" id="search-bar" placeholder="Buscar Brawler..." onkeyup="filtrarBrawlers()">
        </div>

        <div id="game-counter" class="hidden">Partida: <span id="current-game">1</span> / <span id="total-games">0</span></div>

        <section id="step-1" class="step active">
            <h1>¿Habrá Bans Globales?</h1>
            <button onclick="setUsaBansGlobales(true)">Sí</button>
            <button onclick="setUsaBansGlobales(false)">No</button>
        </section>

        <section id="step-2" class="step">
            <h1>Cantidad de Partidas</h1>
            <button onclick="setPartidas(3)">3 Partidas</button>
            <button onclick="setPartidas(5)">5 Partidas</button>
        </section>

        <section id="step-3" class="step">
            <h1>Selecciona de 1 a 5 Bans Globales</h1>
            <div id="global-grid" class="brawler-grid"></div>
            <button id="btn-next-global" class="next-btn" onclick="goToStep(4)">Siguiente (Modo)</button>
        </section>

        <section id="step-4" class="step">
            <h1>Selecciona Modo</h1>
            <div id="modes-grid"></div>
        </section>

        <section id="step-5" class="step">
            <h1>Selecciona Mapa</h1>
            <div id="maps-grid"></div>
        </section>

        <section id="step-6" class="step">
            <h1>Selecciona 6 Bans de Partida</h1>
            <div id="local-grid" class="brawler-grid"></div>
            <button id="btn-next-local" class="next-btn" disabled onclick="goToStep(7)">Siguiente</button>
        </section>

        <section id="step-7" class="step">
            <h1>¿Orden de Pick?</h1>
            <button onclick="iniciarDraft(true)">First Pick</button>
            <button onclick="iniciarDraft(false)">Last Pick</button>
        </section>

        <section id="step-8" class="step">
            <h2 id="turn-indicator">Turno actual</h2>
            
            <div class="draft-board">
                <div class="team-picks">
                    <h3>Nuestro Equipo</h3>
                    <div id="our-picks-container"></div>
                </div>
                <div class="team-picks">
                    <h3>Rival</h3>
                    <div id="enemy-picks-container"></div>
                </div>
            </div>

            <h3>Sugerencias (Calculadas matemáticamente)</h3>
            <div id="suggestions-container" class="suggestions-grid"></div>

            <h3>Selecciona Brawler</h3>
            <div id="draft-selection-grid" class="brawler-grid"></div>
            
            <button id="btn-next-match" class="next-btn hidden" onclick="siguientePartida()">Siguiente Partida</button>
            <button id="btn-restart" class="reset-btn hidden" onclick="location.reload()">Finalizar y Resetear</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
